name: CI/CD Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: fe-sigap-v2
  ARTIFACT_NAME: fe-sigap-v2-build
  NODE_VERSION: 24.x
  PNPM_VERSION: 9.15.2
  RELEASES_TO_KEEP: 5

jobs:
  start_notify:
    name: Notify Start
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.package.outputs.project_name }}
      project_version: ${{ steps.package.outputs.project_version }}
      started_at: ${{ steps.timestamp.outputs.started_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package metadata
        id: package
        run: |
          echo "project_name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "project_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build timestamp
        id: timestamp
        run: echo "started_at=$(TZ=Asia/Jakarta date '+%Y-%m-%d %H:%M:%S WIB')" >> "$GITHUB_OUTPUT"

      - name: Send Telegram start notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_NOTIFICATION }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROJECT_NAME: ${{ steps.package.outputs.project_name }}
          PROJECT_VERSION: ${{ steps.package.outputs.project_version }}
          STARTED_AT: ${{ steps.timestamp.outputs.started_at }}
        run: |
          if [ -z "${BOT_TOKEN}" ] || [ -z "${CHAT_ID}" ]; then
            echo "Telegram notification skipped because token or chat id is empty."
            exit 0
          fi

          MESSAGE="$(cat <<EOF
          <b>CI/CD Started</b>
          Project: <code>${PROJECT_NAME}</code>
          Version: <code>${PROJECT_VERSION}</code>
          Branch: <code>${GITHUB_REF_NAME}</code>
          Commit: <code>${GITHUB_SHA::7}</code>
          Actor: <code>${GITHUB_ACTOR}</code>
          Started: <code>${STARTED_AT}</code>
          EOF
          )"

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}" >/dev/null

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: start_notify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

      - name: Build Vite application
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm build

      - name: Package deploy artifact
        run: tar -czf "${ARTIFACT_NAME}.tar.gz" -C dist .

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_PORT:-22}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Upload artifact to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -P "${VPS_PORT:-22}" "${ARTIFACT_NAME}.tar.gz" \
            "${VPS_USER}@${VPS_HOST}:/tmp/${ARTIFACT_NAME}-${GITHUB_SHA}.tar.gz"

      - name: Activate release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "GITHUB_SHA='${GITHUB_SHA}' RELEASES_TO_KEEP='${RELEASES_TO_KEEP}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'REMOTE'
          set -euo pipefail

          APP_NAME="fe-sigap-v2"
          ARTIFACT_NAME="fe-sigap-v2-build"
          GITHUB_SHA_VALUE="${GITHUB_SHA}"
          RELEASES_TO_KEEP_VALUE="${RELEASES_TO_KEEP}"
          DEPLOY_PATH_VALUE="${DEPLOY_PATH:-}"

          if [ -z "${DEPLOY_PATH_VALUE}" ]; then
            DEPLOY_PATH_VALUE="${HOME}/apps/${APP_NAME}"
          fi

          RELEASES_DIR="${DEPLOY_PATH_VALUE}/releases"
          CURRENT_LINK="${DEPLOY_PATH_VALUE}/current"
          RELEASE_DIR="${RELEASES_DIR}/${GITHUB_SHA_VALUE}"
          ARTIFACT_PATH="/tmp/${ARTIFACT_NAME}-${GITHUB_SHA_VALUE}.tar.gz"

          mkdir -p "${RELEASES_DIR}"

          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"
          tar -xzf "${ARTIFACT_PATH}" -C "${RELEASE_DIR}"

          if [ ! -f "${RELEASE_DIR}/index.html" ]; then
            echo "Missing index.html in release artifact."
            exit 1
          fi

          ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"

          find "${RELEASES_DIR}" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | tail -n +"$((RELEASES_TO_KEEP_VALUE + 1))" \
            | cut -d' ' -f2- \
            | xargs -r rm -rf

          rm -f "${ARTIFACT_PATH}"
          REMOTE

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs:
      - start_notify
      - build
      - deploy
    if: always()
    steps:
      - name: Send Telegram result notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_NOTIFICATION }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROJECT_NAME: ${{ needs.start_notify.outputs.project_name }}
          PROJECT_VERSION: ${{ needs.start_notify.outputs.project_version }}
          STARTED_AT: ${{ needs.start_notify.outputs.started_at }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ -z "${BOT_TOKEN}" ] || [ -z "${CHAT_ID}" ]; then
            echo "Telegram notification skipped because token or chat id is empty."
            exit 0
          fi

          FINISHED_AT="$(TZ=Asia/Jakarta date '+%Y-%m-%d %H:%M:%S WIB')"

          if [ "${BUILD_RESULT}" = "success" ] && [ "${DEPLOY_RESULT}" = "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILED"
          fi

          MESSAGE="$(cat <<EOF
          <b>CI/CD ${STATUS}</b>
          Project: <code>${PROJECT_NAME}</code>
          Version: <code>${PROJECT_VERSION}</code>
          Branch: <code>${GITHUB_REF_NAME}</code>
          Commit: <code>${GITHUB_SHA::7}</code>
          Build: <code>${BUILD_RESULT}</code>
          Deploy: <code>${DEPLOY_RESULT}</code>
          Started: <code>${STARTED_AT}</code>
          Finished: <code>${FINISHED_AT}</code>
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )"

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}" >/dev/null
